<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">CodexControl mark</title>
  <desc id="desc">Rounded square mark with an orbit dial glyph.</desc>
  <defs>
    <linearGradient id="panel" x1="11" y1="8" x2="53" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#afc4ff"/>
      <stop offset="0.48" stop-color="#86a6ff"/>
      <stop offset="1" stop-color="#5c7cff"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(34 30) rotate(90) scale(20)">
      <stop offset="0" stop-color="#cce0ff" stop-opacity=".36"/>
      <stop offset="1" stop-color="#cce0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="7" y="7" width="50" height="50" rx="16" fill="url(#panel)"/>
  <circle cx="32" cy="32" r="18" fill="url(#coreGlow)"/>
  <circle
    cx="32"
    cy="32"
    r="15.5"
    fill="none"
    stroke="#0a1325"
    stroke-linecap="round"
    stroke-width="6.4"
  />
  <circle
    cx="32"
    cy="32"
    r="15.5"
    fill="none"
    stroke="#7fe1a2"
    stroke-dasharray="33 96"
    stroke-linecap="round"
    stroke-width="6.4"
    transform="rotate(-58 32 32)"
  />
  <circle cx="32" cy="32" r="6.1" fill="#0a1325"/>
  <circle cx="32" cy="32" r="2.35" fill="#7fe1a2"/>
  <circle cx="44.9" cy="23.4" r="3.15" fill="#0a1325"/>
</svg>
